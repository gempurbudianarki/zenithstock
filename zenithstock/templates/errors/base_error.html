<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block error_title %}Error | ZenithStock{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; background:var(--color-bg); font-family:'Plus Jakarta Sans',sans-serif; }
        .error-box { text-align:center; max-width:500px; padding:48px 40px; }
        .error-code { font-size:7rem; font-weight:800; line-height:1; background:linear-gradient(135deg,#1e3a5f,#22d3ee); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:8px; }
        .error-title { font-size:1.5rem; font-weight:700; color:var(--color-text-primary); margin:0 0 12px; }
        .error-desc { font-size:0.9375rem; color:var(--color-text-muted); margin:0 0 28px; line-height:1.6; }
        .error-actions { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
    </style>
</head>
<body>
    <div class="error-box animate-fade-in">
        <div class="error-code">{% block error_code %}ERR{% endblock %}</div>
        <h1 class="error-title">{% block error_heading %}Terjadi Kesalahan{% endblock %}</h1>
        <p class="error-desc">{% block error_message %}Silakan kembali atau hubungi administrator.{% endblock %}</p>
        <div class="error-actions">
            <a href="javascript:history.back()" class="btn btn-secondary">← Kembali</a>
            {% if current_user.is_authenticated %}
            <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary">Dashboard</a>
            {% else %}
            <a href="{{ url_for('auth.login') }}" class="btn btn-primary">Login</a>
            {% endif %}
        </div>
    </div>
</body>
</html>
